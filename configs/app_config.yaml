app:
  name: TokenSelect
  version: 0.1.0
  environment: development

database:
  driver: postgresql
  host: localhost
  port: 5432
  name: tokenselect
  user: postgres
  password: ${DB_PASSWORD:postgres}

server:
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
